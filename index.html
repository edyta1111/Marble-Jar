<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Marble Jar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface2: #231f35;
    --accent: #e8b4b8;
    --accent2: #a78bfa;
    --gold: #f4c542;
    --text: #fffffe;
    --text-muted: #a7a5b5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; height: 100dvh; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(167,139,250,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(232,180,184,0.10) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Clear button — top right corner, very subtle */
  .clear-btn {
    position: fixed;
    top: 18px; right: 18px;
    z-index: 10;
    background: none;
    border: none;
    color: rgba(239,68,68,0.4);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: rgba(239,68,68,0.8); }

  /* Main layout */
  .screen {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px 28px 28px;
    width: 100%;
    max-width: 380px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    font-style: italic;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Counter */
  .counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 100px;
    padding: 4px 18px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .counter strong {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    font-family: 'Playfair Display', serif;
  }

  .last-cleared {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
    letter-spacing: 0.5px;
    min-height: 16px;
  }
  .jar-wrap {
    position: relative;
    width: 210px;
    height: 260px;
  }
  .jar-wrap svg { width: 100%; height: 100%; overflow: visible; }

  .jar-marbles {
    position: absolute;
    bottom: 22px; left: 22px; right: 22px;
    height: 196px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    justify-content: center;
    gap: 2px;
    padding: 2px;
    overflow: hidden;
    transform: scaleY(-1);
  }

  .marble {
    width: 13px; height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .marble.silent { animation: none; }
  .marble::after {
    content: '';
    position: absolute;
    top: 2px; left: 3px;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
  }
  @keyframes pop {
    from { transform: scaleY(-1) scale(0); opacity: 0; }
    to   { transform: scaleY(-1) scale(1); opacity: 1; }
  }

  /* Add button — full width, prominent */
  .add-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    padding: 18px;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .add-btn:active { transform: scale(0.98); filter: brightness(0.9); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 14px;
    color: var(--text);
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(16px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
  }
</style>
</head>
<body>

<button class="clear-btn" onclick="clearAll()">clear</button>

<div class="screen">

  <h1>Marble Jar</h1>

  <div class="counter">
    <strong id="totalCount">0</strong><span>marbles</span>
  </div>
  <div id="lastCleared" class="last-cleared"></div>

  <div class="jar-wrap">
    <svg viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="jarGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="rgba(180,170,230,0.18)"/>
          <stop offset="40%"  stop-color="rgba(220,215,250,0.06)"/>
          <stop offset="100%" stop-color="rgba(180,170,230,0.14)"/>
        </linearGradient>
        <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#3d3560"/>
          <stop offset="100%" stop-color="#2a2245"/>
        </linearGradient>
      </defs>
      <path d="M28 60 Q24 65 22 80 L18 230 Q18 250 100 250 Q182 250 182 230 L178 80 Q176 65 172 60 Z"
            fill="url(#jarGrad)" stroke="rgba(180,170,230,0.35)" stroke-width="1.5"/>
      <path d="M36 80 Q33 120 32 180"    stroke="rgba(255,255,255,0.12)" stroke-width="4" stroke-linecap="round"/>
      <path d="M160 85 Q163 130 163 185" stroke="rgba(255,255,255,0.06)" stroke-width="3" stroke-linecap="round"/>
      <rect x="22" y="42" width="156" height="22" rx="6" fill="url(#lidGrad)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <rect x="40" y="34" width="120" height="14" rx="5" fill="#2e2650"     stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
      <ellipse cx="100" cy="30" rx="18" ry="7" fill="#3d3560" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <ellipse cx="100" cy="244" rx="68" ry="5" fill="rgba(167,139,250,0.08)"/>
    </svg>
    <div class="jar-marbles" id="jarMarbles"></div>
  </div>

  <button class="add-btn" onclick="addMarble()">+ Reward</button>

</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = [
  'linear-gradient(135deg,#b388ff,#7c4dff)',
  'linear-gradient(135deg,#80deea,#26c6da)',
  'linear-gradient(135deg,#f48fb1,#e91e8c)',
  'linear-gradient(135deg,#ffe082,#ffb300)',
  'linear-gradient(135deg,#a5d6a7,#43a047)',
  'linear-gradient(135deg,#ef9a9a,#e53935)',
  'linear-gradient(135deg,#90caf9,#1e88e5)',
  'linear-gradient(135deg,#ffccbc,#ff7043)',
];

let count = parseInt(localStorage.getItem('marbleCount') || '0');

function init() {
  document.getElementById('totalCount').textContent = count;
  updateLastCleared();
  const jar = document.getElementById('jarMarbles');
  const show = Math.min(count, 70);
  for (let i = 0; i < show; i++) jar.appendChild(makeMarble(i, true));
}

function updateLastCleared() {
  const ts = localStorage.getItem('lastCleared');
  const el = document.getElementById('lastCleared');
  if (!ts) { el.textContent = ''; return; }
  const d = new Date(parseInt(ts));
  el.textContent = 'last cleared ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function makeMarble(idx, silent) {
  const div = document.createElement('div');
  div.className = 'marble' + (silent ? ' silent' : '');
  div.style.background = COLORS[idx % COLORS.length];
  div.style.transform = 'scaleY(-1)';
  return div;
}

function addMarble() {
  count++;
  localStorage.setItem('marbleCount', count);
  document.getElementById('totalCount').textContent = count;
  const jar = document.getElementById('jarMarbles');
  if (jar.children.length >= 70) jar.removeChild(jar.firstChild);
  jar.appendChild(makeMarble(count - 1, false));
  playMarbleSound();
}

function clearAll() {
  if (count === 0) return;
  showConfirm('Clear all marbles?', () => {
    count = 0;
    localStorage.setItem('marbleCount', 0);
    localStorage.setItem('lastCleared', Date.now());
    document.getElementById('totalCount').textContent = 0;
    document.getElementById('jarMarbles').innerHTML = '';
    updateLastCleared();
    showToast('Jar emptied');
  });
}

function playMarbleSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;

  const tap = ctx.createOscillator();
  const tapGain = ctx.createGain();
  tap.connect(tapGain); tapGain.connect(ctx.destination);
  tap.type = 'sine';
  tap.frequency.setValueAtTime(1800, now);
  tap.frequency.exponentialRampToValueAtTime(900, now + 0.04);
  tapGain.gain.setValueAtTime(0.35, now);
  tapGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  tap.start(now); tap.stop(now + 0.08);

  const ring = ctx.createOscillator();
  const ringGain = ctx.createGain();
  ring.connect(ringGain); ringGain.connect(ctx.destination);
  ring.type = 'sine';
  ring.frequency.setValueAtTime(520, now + 0.01);
  ring.frequency.exponentialRampToValueAtTime(460, now + 0.25);
  ringGain.gain.setValueAtTime(0, now);
  ringGain.gain.linearRampToValueAtTime(0.18, now + 0.015);
  ringGain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
  ring.start(now); ring.stop(now + 0.3);

  const bounce = ctx.createOscillator();
  const bounceGain = ctx.createGain();
  bounce.connect(bounceGain); bounceGain.connect(ctx.destination);
  bounce.type = 'sine';
  bounce.frequency.setValueAtTime(1400, now + 0.07);
  bounce.frequency.exponentialRampToValueAtTime(700, now + 0.11);
  bounceGain.gain.setValueAtTime(0, now + 0.07);
  bounceGain.gain.linearRampToValueAtTime(0.1, now + 0.075);
  bounceGain.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
  bounce.start(now + 0.07); bounce.stop(now + 0.14);
}

function showConfirm(msg, onYes) {
  const existing = document.getElementById('confirmBar');
  if (existing) existing.remove();
  const bar = document.createElement('div');
  bar.id = 'confirmBar';
  bar.style.cssText = `
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
    background:#231f35;border:1px solid rgba(239,68,68,0.4);
    border-radius:100px;padding:10px 16px;
    display:flex;align-items:center;gap:12px;
    font-family:'DM Sans',sans-serif;font-size:14px;color:#fffffe;
    z-index:200;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.5);
    animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  `;
  bar.innerHTML = `
    <span>${msg}</span>
    <button onclick="document.getElementById('confirmBar').remove()" style="
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
      border-radius:20px;color:#a7a5b5;font-size:13px;padding:4px 12px;
      cursor:pointer;font-family:'DM Sans',sans-serif;">Cancel</button>
    <button id="confirmYes" style="
      background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.5);
      border-radius:20px;color:#ef4444;font-size:13px;padding:4px 12px;
      cursor:pointer;font-family:'DM Sans',sans-serif;">Clear</button>
  `;
  document.body.appendChild(bar);
  document.getElementById('confirmYes').onclick = () => { bar.remove(); onYes(); };
  setTimeout(() => { const b = document.getElementById('confirmBar'); if (b) b.remove(); }, 5000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
